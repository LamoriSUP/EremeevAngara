apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: homework
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: homework
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres